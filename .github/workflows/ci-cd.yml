name: Build & Deploy Full Stack to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-push-deploy-compose:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USER }}/family-tree-app:latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy/stack/docker-compose.ec2.yml,database/family_tree_db.sql"
          target: "~/family-tree"

      - name: SSH into EC2 and deploy full stack
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 40m
          script: |
            set -e
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            DEPLOY_DIR="$HOME/family-tree"
            EXISTING_MYSQL_DATABASE=""
            EXISTING_MYSQL_ROOT_PASSWORD=""
            EXISTING_MEDIA_UPLOAD_DIR=""

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ -f .env ]; then
              EXISTING_MYSQL_DATABASE="$(grep '^MYSQL_DATABASE=' .env | cut -d '=' -f 2- || true)"
              EXISTING_MYSQL_ROOT_PASSWORD="$(grep '^MYSQL_ROOT_PASSWORD=' .env | cut -d '=' -f 2- || true)"
              EXISTING_MEDIA_UPLOAD_DIR="$(grep '^MEDIA_UPLOAD_DIR=' .env | cut -d '=' -f 2- || true)"
            fi

            if ! docker compose version >/dev/null 2>&1; then
              mkdir -p ~/.docker/cli-plugins
              ARCH="$(uname -m)"
              if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                COMPOSE_BIN="docker-compose-linux-aarch64"
              else
                COMPOSE_BIN="docker-compose-linux-x86_64"
              fi
              curl -SL "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}" -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
            fi

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "Docker Compose not found."
                exit 1
              fi
            }

            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

            cat > .env <<EOF
            APP_IMAGE=$IMAGE_NAME
            MYSQL_DATABASE=${EXISTING_MYSQL_DATABASE:-family_tree_db}
            MYSQL_ROOT_PASSWORD=${EXISTING_MYSQL_ROOT_PASSWORD:-family_tree_change_me}
            MEDIA_UPLOAD_DIR=${EXISTING_MEDIA_UPLOAD_DIR:-/data/media}
            LIVESTREAM_ICE_SERVERS_JSON=${{ secrets.LIVESTREAM_ICE_SERVERS_JSON }}
            EOF

            # Cleanup legacy standalone containers from old deploy flow.
            docker rm -f family-tree-app family-tree-mysql family-tree-nginx family-tree-coturn || true
            compose -f deploy/stack/docker-compose.ec2.yml --env-file .env pull
            compose -f deploy/stack/docker-compose.ec2.yml --env-file .env up -d --remove-orphans
            compose -f deploy/stack/docker-compose.ec2.yml --env-file .env ps
            docker image prune -f || true
