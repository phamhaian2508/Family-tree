name: Build & Deploy Full Stack to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-push-deploy-compose:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USER }}/family-tree-app:latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Preflight SSH Connectivity
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.EC2_HOST }}"
          echo "Checking SSH reachability to ${HOST}:22"
          for i in {1..5}; do
            if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${HOST}/22" 2>/dev/null; then
              echo "SSH port is reachable."
              exit 0
            fi
            echo "Attempt ${i}/5 failed, retrying..."
            sleep 3
          done
          echo "Cannot reach ${HOST}:22 from GitHub runner."
          echo "Please check EC2 public IP/DNS, Security Group inbound 22, NACL, route table, and host firewall."
          exit 1

      - name: SSH into EC2 and deploy full stack
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          timeout: 60s
          command_timeout: 40m
          script_stop: true
          debug: true
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            DEPLOY_DIR="$HOME/family-tree"
            REPO_NAME="${{ github.repository }}"
            BRANCH_NAME="${{ github.ref_name }}"
            GITHUB_TOKEN="${{ github.token }}"
            EXISTING_MYSQL_DATABASE=""
            EXISTING_MYSQL_ROOT_PASSWORD=""
            EXISTING_MEDIA_UPLOAD_DIR=""

            log() {
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"
            }

            log "Prepare deploy directory"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            mkdir -p deploy/stack database

            download_file() {
              SRC_PATH="$1"
              DEST_PATH="$2"
              RAW_URL="https://raw.githubusercontent.com/${REPO_NAME}/${BRANCH_NAME}/${SRC_PATH}"
              API_URL="https://api.github.com/repos/${REPO_NAME}/contents/${SRC_PATH}?ref=${BRANCH_NAME}"
              curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 120 "${RAW_URL}" -o "${DEST_PATH}" \
                || curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 120 \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/vnd.github.raw" \
                  "${API_URL}" -o "${DEST_PATH}"
            }

            # Pull deployment manifests directly from repository to avoid SCP timeout.
            log "Download docker-compose manifest"
            download_file "deploy/stack/docker-compose.ec2.yml" "deploy/stack/docker-compose.ec2.yml"
            if [ ! -f database/family_tree_db.sql ]; then
              log "Download initial database seed"
              download_file "database/family_tree_db.sql" "database/family_tree_db.sql"
            fi

            if [ -f .env ]; then
              EXISTING_MYSQL_DATABASE="$(grep '^MYSQL_DATABASE=' .env | cut -d '=' -f 2- || true)"
              EXISTING_MYSQL_ROOT_PASSWORD="$(grep '^MYSQL_ROOT_PASSWORD=' .env | cut -d '=' -f 2- || true)"
              EXISTING_MEDIA_UPLOAD_DIR="$(grep '^MEDIA_UPLOAD_DIR=' .env | cut -d '=' -f 2- || true)"
            fi

            if docker compose version >/dev/null 2>&1; then
              log "Using docker compose plugin"
            elif command -v docker-compose >/dev/null 2>&1; then
              log "Using docker-compose binary"
            else
              log "Docker compose not found, installing plugin"
              mkdir -p ~/.docker/cli-plugins
              ARCH="$(uname -m)"
              if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                COMPOSE_BIN="docker-compose-linux-aarch64"
              else
                COMPOSE_BIN="docker-compose-linux-x86_64"
              fi
              if command -v curl >/dev/null 2>&1; then
                curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 120 \
                  "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}" \
                  -o ~/.docker/cli-plugins/docker-compose
              elif command -v wget >/dev/null 2>&1; then
                wget -q -O ~/.docker/cli-plugins/docker-compose \
                  "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}"
              else
                echo "Neither curl nor wget is installed on EC2."
                exit 1
              fi
              chmod +x ~/.docker/cli-plugins/docker-compose
              docker compose version >/dev/null 2>&1 || {
                echo "Docker compose installation failed."
                exit 1
              }
            fi

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "Docker Compose not found."
                exit 1
              fi
            }

            compose_with_timeout() {
              TIMEOUT_SECONDS="$1"
              shift
              if docker compose version >/dev/null 2>&1; then
                timeout "${TIMEOUT_SECONDS}" docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                timeout "${TIMEOUT_SECONDS}" docker-compose "$@"
              else
                echo "Docker Compose not found."
                exit 1
              fi
            }

            log "Docker login"
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

            log "Write .env"
            cat > .env <<EOF
            APP_IMAGE=$IMAGE_NAME
            MYSQL_DATABASE=${EXISTING_MYSQL_DATABASE:-family_tree_db}
            MYSQL_ROOT_PASSWORD=${EXISTING_MYSQL_ROOT_PASSWORD:-family_tree_change_me}
            MEDIA_UPLOAD_DIR=${EXISTING_MEDIA_UPLOAD_DIR:-/data/media}
            LIVESTREAM_ICE_SERVERS_JSON=${{ secrets.LIVESTREAM_ICE_SERVERS_JSON }}
            EOF

            # Cleanup legacy standalone containers from old deploy flow.
            log "Cleanup legacy containers"
            docker rm -f family-tree-app family-tree-mysql family-tree-nginx family-tree-coturn || true

            log "Pull app image"
            compose_with_timeout 1200 -f deploy/stack/docker-compose.ec2.yml --env-file .env pull app

            log "Deploy app (and mysql if missing)"
            if compose -f deploy/stack/docker-compose.ec2.yml --env-file .env ps mysql >/dev/null 2>&1; then
              compose_with_timeout 1200 -f deploy/stack/docker-compose.ec2.yml --env-file .env up -d --remove-orphans app
            else
              compose_with_timeout 1200 -f deploy/stack/docker-compose.ec2.yml --env-file .env up -d --remove-orphans
            fi

            log "Post-deploy status"
            compose -f deploy/stack/docker-compose.ec2.yml --env-file .env ps
            docker image prune -f || true
            log "Deploy completed"
