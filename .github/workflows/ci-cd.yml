name: Build & Deploy Full Stack to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-push-deploy-compose:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USER }}/family-tree-app:latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy/stack/docker-compose.ec2.yml,database/family_tree_db.sql"
          target: "~/family-tree"

      - name: SSH into EC2 and deploy full stack
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 40m
          script: |
            set -e
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            DEPLOY_DIR="$HOME/family-tree"

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if ! docker compose version >/dev/null 2>&1; then
              mkdir -p ~/.docker/cli-plugins
              ARCH="$(uname -m)"
              if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                COMPOSE_BIN="docker-compose-linux-aarch64"
              else
                COMPOSE_BIN="docker-compose-linux-x86_64"
              fi
              curl -SL "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}" -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
            fi

            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

            cat > .env <<EOF
            APP_IMAGE=$IMAGE_NAME
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=family_tree_db
            LIVESTREAM_ICE_SERVERS_JSON=${{ secrets.LIVESTREAM_ICE_SERVERS_JSON }}
            EOF

            docker compose -f deploy/stack/docker-compose.ec2.yml --env-file .env pull
            docker compose -f deploy/stack/docker-compose.ec2.yml --env-file .env up -d --remove-orphans
            docker compose -f deploy/stack/docker-compose.ec2.yml --env-file .env ps
