name: Build & Deploy Full Stack to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USER }}/family-tree-app:latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        shell: bash
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Preflight SSH connectivity
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          echo "Checking SSH reachability to ${EC2_HOST}:22"
          for i in {1..5}; do
            if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${EC2_HOST}/22" 2>/dev/null; then
              echo "SSH port is reachable."
              exit 0
            fi
            echo "Attempt ${i}/5 failed, retrying..."
            sleep 3
          done
          echo "Cannot reach ${EC2_HOST}:22 from GitHub runner."
          exit 1

      - name: Upload deploy compose file
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/ec2_key.pem "${EC2_USER}@${EC2_HOST}" \
            "mkdir -p ~/family-tree/deploy/stack ~/family-tree/database"
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/ec2_key.pem \
            deploy/stack/docker-compose.ec2.yml \
            "${EC2_USER}@${EC2_HOST}:~/family-tree/deploy/stack/docker-compose.ec2.yml"
          if ! ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/ec2_key.pem "${EC2_USER}@${EC2_HOST}" \
            "test -f ~/family-tree/database/family_tree_db.sql"; then
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/ec2_key.pem \
              database/family_tree_db.sql \
              "${EC2_USER}@${EC2_HOST}:~/family-tree/database/family_tree_db.sql"
          fi

      - name: Deploy on EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          LIVESTREAM_ICE_SERVERS_JSON: ${{ secrets.LIVESTREAM_ICE_SERVERS_JSON }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/ec2_key.pem "${EC2_USER}@${EC2_HOST}" \
            "IMAGE_NAME='${IMAGE_NAME}' DOCKER_USER='${DOCKER_USER}' DOCKER_TOKEN='${DOCKER_TOKEN}' LIVESTREAM_ICE_SERVERS_JSON='${LIVESTREAM_ICE_SERVERS_JSON}' bash -s" <<'EOF'
          set -euo pipefail
          trap 'echo "FAILED at line ${LINENO}: ${BASH_COMMAND}"' ERR

          log() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"
          }

          DEPLOY_DIR="$HOME/family-tree"
          COMPOSE_FILE="$DEPLOY_DIR/deploy/stack/docker-compose.ec2.yml"
          ENV_FILE="$DEPLOY_DIR/.env"

          EXISTING_MYSQL_DATABASE=""
          EXISTING_MYSQL_ROOT_PASSWORD=""
          EXISTING_MEDIA_UPLOAD_DIR=""

          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Missing compose file: $COMPOSE_FILE"
            exit 1
          fi

          if [ -f "$ENV_FILE" ]; then
            EXISTING_MYSQL_DATABASE="$(grep '^MYSQL_DATABASE=' "$ENV_FILE" | cut -d '=' -f 2- || true)"
            EXISTING_MYSQL_ROOT_PASSWORD="$(grep '^MYSQL_ROOT_PASSWORD=' "$ENV_FILE" | cut -d '=' -f 2- || true)"
            EXISTING_MEDIA_UPLOAD_DIR="$(grep '^MEDIA_UPLOAD_DIR=' "$ENV_FILE" | cut -d '=' -f 2- || true)"
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_ENGINE="docker compose"
            log "Using docker compose plugin"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_ENGINE="docker-compose"
            log "Using docker-compose binary"
          else
            log "Docker Compose not found, installing plugin"
            mkdir -p ~/.docker/cli-plugins
            ARCH="$(uname -m)"
            if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
              COMPOSE_BIN="docker-compose-linux-aarch64"
            else
              COMPOSE_BIN="docker-compose-linux-x86_64"
            fi
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 120 \
                "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}" \
                -o ~/.docker/cli-plugins/docker-compose
            elif command -v wget >/dev/null 2>&1; then
              wget -q -O ~/.docker/cli-plugins/docker-compose \
                "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}"
            else
              echo "Neither curl nor wget is installed on EC2."
              exit 1
            fi
            chmod +x ~/.docker/cli-plugins/docker-compose

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_ENGINE="docker compose"
              log "Docker compose plugin installed"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_ENGINE="docker-compose"
              log "Using docker-compose binary after install attempt"
            else
              echo "Docker Compose installation failed."
              exit 1
            fi
          fi

          compose() {
            if [ "$COMPOSE_ENGINE" = "docker compose" ]; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          log "Docker login"
          echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin

          log "Write env file"
          cat > "$ENV_FILE" <<EOT
          APP_IMAGE=$IMAGE_NAME
          MYSQL_DATABASE=${EXISTING_MYSQL_DATABASE:-family_tree_db}
          MYSQL_ROOT_PASSWORD=${EXISTING_MYSQL_ROOT_PASSWORD:-family_tree_change_me}
          MEDIA_UPLOAD_DIR=${EXISTING_MEDIA_UPLOAD_DIR:-/data/media}
          LIVESTREAM_ICE_SERVERS_JSON=$LIVESTREAM_ICE_SERVERS_JSON
          EOT

          log "Cleanup legacy containers"
          docker rm -f family-tree-app family-tree-mysql family-tree-nginx family-tree-coturn >/dev/null 2>&1 || true

          log "Pull app image"
          compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" pull app

          log "Deploy app stack"
          compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" up -d --remove-orphans

          log "Post-deploy status"
          compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" ps
          docker image prune -f || true
          log "Deploy completed"
          EOF
