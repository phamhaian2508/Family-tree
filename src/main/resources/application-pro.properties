spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
media.upload.dir=${MEDIA_UPLOAD_DIR:/data/media}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:100}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}

# JSON array for WebRTC ICE servers.
# Recommended to use your own TURN server in production.
# Example:
# livestream.webrtc.ice-servers-json=[{"urls":"stun:stun.l.google.com:19302"},{"urls":"turn:turn.your-domain.com:3478","username":"${TURN_USERNAME}","credential":"${TURN_PASSWORD}"},{"urls":"turns:turn.your-domain.com:5349?transport=tcp","username":"${TURN_USERNAME}","credential":"${TURN_PASSWORD}"}]
livestream.webrtc.ice-servers-json=${LIVESTREAM_ICE_SERVERS_JSON:[]}
