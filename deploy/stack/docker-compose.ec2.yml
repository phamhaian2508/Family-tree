services:
  mysql:
    image: mysql:8.0
    container_name: family-tree-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=80
      - --performance_schema=OFF
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../database/family_tree_db.sql:/docker-entrypoint-initdb.d/01-family_tree_db.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    mem_limit: 768m
    cpus: "0.80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ${APP_IMAGE}
    container_name: family-tree-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: pro
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      LIVESTREAM_ICE_SERVERS_JSON: ${LIVESTREAM_ICE_SERVERS_JSON}
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "127.0.0.1:8080:8080"
    mem_limit: 900m
    cpus: "1.00"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
